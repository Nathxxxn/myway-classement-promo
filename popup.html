<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyWay - Classement Promo</title>
  <style>
    :root {
      color-scheme: light;
      --accent: #9a1f28;
      --text: #202020;
      --muted: #68645e;
      --line: #dedbd5;
      --surface: #fff;
      --soft: #f7f6f3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 310px;
      margin: 0;
      padding: 16px;
      background: var(--surface);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      line-height: 1.4;
    }

    header {
      display: grid;
      gap: 4px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
    }

    .version {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    main {
      display: grid;
      gap: 12px;
      padding-top: 12px;
    }

    .signature {
      padding-left: 10px;
      border-left: 3px solid var(--accent);
    }

    .signature strong {
      display: block;
      margin-bottom: 2px;
      font-size: 14px;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .note {
      padding: 10px;
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1>MyWay - Classement Promo</h1>
    <div class="version">Version 1.0</div>
  </header>

  <main>
    <section class="signature" aria-label="Signature">
      <strong>Développé par Nathan Di Fraja</strong>
      <p>Extension de classement pour MyWay CentraleSupélec.</p>
    </section>

    <p class="note">
      Projet indépendant, non affilié à CentraleSupélec ou MyWay.
    </p>
  </main>
</body>
</html>
